{% extends "base.html" %}
{% block title %}Edit {{ item.code }} — Indicators{% endblock %}
{% block page_title %}Edit — {{ item.code }}{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <form method="post" action="/analytics/indicators/{{ item.id }}/edit" class="bg-white rounded-lg border p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Code <span class="text-red-500">*</span></label>
        <input name="code" required value="{{ item.code }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Process <span class="text-red-500">*</span></label>
        <select name="process_code" required class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          {% for code, name in process_names.items() %}
          <option value="{{ code }}" {{ 'selected' if item.process_code == code }}>{{ code }} — {{ name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Name <span class="text-red-500">*</span></label>
      <input name="name" required value="{{ item.name }}"
             class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Description</label>
      <textarea name="description" rows="2"
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">{{ item.description or '' }}</textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Formula</label>
      <textarea name="formula" rows="2"
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 font-mono">{{ item.formula or '' }}</textarea>
    </div>
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Target Value</label>
        <input name="target_value" type="number" step="0.01" value="{{ item.target_value if item.target_value is not none else '' }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Unit</label>
        <input name="unit" value="{{ item.unit or '' }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Frequency</label>
        {% set freq = item.frequency.value if item.frequency.value is defined else item.frequency %}
        <select name="frequency" class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          <option value="monthly" {{ 'selected' if freq == 'monthly' }}>Monthly</option>
          <option value="quarterly" {{ 'selected' if freq == 'quarterly' }}>Quarterly</option>
          <option value="yearly" {{ 'selected' if freq == 'yearly' }}>Yearly</option>
        </select>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Owner</label>
        <input name="owner" value="{{ item.owner or '' }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div class="flex items-end">
        <label class="flex items-center gap-2 text-sm text-secondary-700 pb-2">
          <input type="checkbox" name="is_active" value="true" {{ 'checked' if item.is_active }} class="rounded border-secondary-300 text-primary-600 focus:ring-primary-500">
          Active
        </label>
      </div>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <a href="/analytics/indicators/{{ item.id }}" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
