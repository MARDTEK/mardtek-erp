{% extends "base.html" %}
{% block title %}Create KPI Report — Analytics{% endblock %}
{% block page_title %}Create KPI Report{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <form method="post" action="/analytics/kpi-reports" class="bg-white rounded-lg border p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Code <span class="text-red-500">*</span></label>
        <input name="code" required placeholder="RPT-P11-001"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Title <span class="text-red-500">*</span></label>
        <input name="title" required placeholder="Q1 2026 Performance Report"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Period Start <span class="text-red-500">*</span></label>
        <input name="period_start" type="date" required
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Period End <span class="text-red-500">*</span></label>
        <input name="period_end" type="date" required
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Indicators Data (JSON)</label>
      <textarea name="indicators_data" rows="4" placeholder='[{"indicator_id": 1, "name": "CSAT", "value": 92, "target": 95, "status": "on_track"}]'
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 font-mono"></textarea>
      <p class="text-xs text-secondary-400 mt-1">Optional JSON array with indicator data for this report period.</p>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <a href="/analytics/kpi-reports" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Report</button>
    </div>
  </form>
</div>
{% endblock %}
