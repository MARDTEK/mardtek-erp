{% extends "base.html" %}
{% block title %}Create Indicator — Analytics{% endblock %}
{% block page_title %}Create Indicator{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <form method="post" action="/analytics/indicators" class="bg-white rounded-lg border p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Code <span class="text-red-500">*</span></label>
        <input name="code" required placeholder="KPI-P11-001"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Process <span class="text-red-500">*</span></label>
        <select name="process_code" required class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          {% for code, name in process_names.items() %}
          <option value="{{ code }}">{{ code }} — {{ name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Name <span class="text-red-500">*</span></label>
      <input name="name" required placeholder="Customer Satisfaction Score"
             class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Description</label>
      <textarea name="description" rows="2" placeholder="What this indicator measures..."
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Formula</label>
      <textarea name="formula" rows="2" placeholder="e.g. (satisfied / total) * 100"
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 font-mono"></textarea>
    </div>
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Target Value</label>
        <input name="target_value" type="number" step="0.01" placeholder="95.00"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Unit</label>
        <input name="unit" placeholder="%, days, count"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Frequency</label>
        <select name="frequency" class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          <option value="monthly">Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Owner</label>
        <input name="owner" placeholder="Responsible person or team"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div class="flex items-end">
        <label class="flex items-center gap-2 text-sm text-secondary-700 pb-2">
          <input type="checkbox" name="is_active" value="true" checked class="rounded border-secondary-300 text-primary-600 focus:ring-primary-500">
          Active
        </label>
      </div>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <a href="/analytics/indicators" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Indicator</button>
    </div>
  </form>
</div>
{% endblock %}
