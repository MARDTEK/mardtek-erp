{% extends "base.html" %}
{% block title %}Create Dashboard — Analytics{% endblock %}
{% block page_title %}Create Dashboard{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <form method="post" action="/analytics/dashboards" class="bg-white rounded-lg border p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Code <span class="text-red-500">*</span></label>
        <input name="code" required placeholder="DBS-P11-001"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Title <span class="text-red-500">*</span></label>
        <input name="title" required placeholder="Executive Performance Dashboard"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div>
      <label class="flex items-center gap-2 text-sm text-secondary-700">
        <input type="checkbox" name="is_default" value="true" class="rounded border-secondary-300 text-primary-600 focus:ring-primary-500">
        Set as default dashboard
      </label>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Layout (JSON)</label>
      <textarea name="layout" rows="4" placeholder='{"columns": 2, "widgets": ["kpi_summary", "trend_chart"]}'
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 font-mono"></textarea>
      <p class="text-xs text-secondary-400 mt-1">Optional JSON layout configuration.</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Filters (JSON)</label>
      <textarea name="filters" rows="4" placeholder='{"process_codes": ["P1","P2"], "frequency": "monthly"}'
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 font-mono"></textarea>
      <p class="text-xs text-secondary-400 mt-1">Optional JSON filter configuration.</p>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <a href="/analytics/dashboards" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Dashboard</button>
    </div>
  </form>
</div>
{% endblock %}
