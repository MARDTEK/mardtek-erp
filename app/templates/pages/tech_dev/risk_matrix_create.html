{% extends "base.html" %}
{% block title %}Create Risk Matrix{% endblock %}
{% block page_title %}Create Risk Matrix{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-lg border p-6">
    <h3 class="text-lg font-semibold mb-4">New Risk Matrix</h3>
    <form method="post" action="/development/risk-matrices">
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-secondary-700 mb-1">Code</label>
            <input name="code" required placeholder="RM-2026-001"
                   class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-secondary-700 mb-1">Version</label>
            <input name="version" value="1.0"
                   class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Project ID (optional)</label>
          <input name="project_id" type="number"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Risks JSON (optional)</label>
          <textarea name="risks_json" rows="5" placeholder='[{"title":"Risk A","likelihood":"high","impact":"critical","mitigation":"..."}]'
                    class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm font-mono focus:ring-2 focus:ring-primary-500 focus:border-primary-500"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-6">
        <a href="/development/risk-matrices" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Risk Matrix</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
