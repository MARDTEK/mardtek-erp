{% extends "base.html" %}
{% block title %}Edit Risk Matrix {{ item.code }}{% endblock %}
{% block page_title %}Edit Risk Matrix {{ item.code }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-lg border p-6">
    <h3 class="text-lg font-semibold mb-4">Edit {{ item.code }}</h3>
    <form method="post" action="/development/risk-matrices/{{ item.id }}/edit">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Version</label>
          <input name="version" required value="{{ item.version }}"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Risks JSON</label>
          <textarea name="risks_json" rows="8"
                    class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm font-mono focus:ring-2 focus:ring-primary-500 focus:border-primary-500">{{ item.risks | tojson if item.risks else '[]' }}</textarea>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-6">
        <a href="/development/risk-matrices/{{ item.id }}" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
