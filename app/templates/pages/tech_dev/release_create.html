{% extends "base.html" %}
{% block title %}Create Release Plan{% endblock %}
{% block page_title %}Create Release Plan{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-lg border p-6">
    <h3 class="text-lg font-semibold mb-4">New Release Plan</h3>
    <form method="post" action="/development/releases">
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-secondary-700 mb-1">Code</label>
            <input name="code" required placeholder="REL-2026-v1.0"
                   class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-secondary-700 mb-1">Version</label>
            <input name="version" required placeholder="1.0.0"
                   class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Title</label>
          <input name="title" required
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Product</label>
          <input name="product" required placeholder="MARDTEK Core"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Planned Date</label>
          <input name="planned_date" type="date" required
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Features JSON (optional)</label>
          <textarea name="features_json" rows="3" placeholder='[{"title":"Feature A","description":"..."}]'
                    class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm font-mono focus:ring-2 focus:ring-primary-500 focus:border-primary-500"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Release Notes (optional)</label>
          <textarea name="release_notes" rows="3"
                    class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-6">
        <a href="/development/releases" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Release</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
