{% extends "base.html" %}
{% block title %}Create Product Roadmap{% endblock %}
{% block page_title %}Create Product Roadmap{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-lg border p-6">
    <h3 class="text-lg font-semibold mb-4">New Product Roadmap</h3>
    <form method="post" action="/development/roadmaps">
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-secondary-700 mb-1">Code</label>
            <input name="code" required placeholder="RM-2026-Q1-Title"
                   class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-secondary-700 mb-1">Year</label>
            <input name="year" type="number" required value="2026"
                   class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Title</label>
          <input name="title" required
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Product Line</label>
          <input name="product_line" required placeholder="e.g. MARDTEK Core"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Vision</label>
          <textarea name="vision" rows="3" required
                    class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Strategic Goals</label>
          <textarea name="strategic_goals" rows="3" required
                    class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Items JSON (optional)</label>
          <textarea name="items_json" rows="3" placeholder='[{"title":"Feature A","quarter":"Q1"}]'
                    class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm font-mono focus:ring-2 focus:ring-primary-500 focus:border-primary-500"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-6">
        <a href="/development/roadmaps" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Roadmap</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
