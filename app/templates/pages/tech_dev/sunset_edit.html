{% extends "base.html" %}
{% block title %}Edit Sunset {{ item.code }}{% endblock %}
{% block page_title %}Edit Sunset {{ item.code }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-lg border p-6">
    <h3 class="text-lg font-semibold mb-4">Edit {{ item.code }}</h3>
    <form method="post" action="/development/sunsets/{{ item.id }}/edit">
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-secondary-700 mb-1">Product</label>
            <input name="product" required value="{{ item.product }}"
                   class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-secondary-700 mb-1">Sunset Date</label>
            <input name="sunset_date" type="date" required value="{{ item.sunset_date.strftime('%Y-%m-%d') if item.sunset_date else '' }}"
                   class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Migration Path</label>
          <textarea name="migration_path" rows="4" required
                    class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">{{ item.migration_path }}</textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Approved By</label>
          <input name="approved_by" required value="{{ item.approved_by }}"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-6">
        <a href="/development/sunsets/{{ item.id }}" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
