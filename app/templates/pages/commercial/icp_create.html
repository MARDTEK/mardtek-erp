{% extends "base.html" %}
{% from 'macros.html' import form_input, form_textarea, form_select, form_submit %}
{% block title %}Create ICP Profile — Commercial Sales{% endblock %}
{% block page_title %}Create ICP Profile{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <form method="post" action="/commercial/icp" class="bg-white rounded-lg border p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Industry <span class="text-red-500">*</span></label>
        <input name="industry" required placeholder="Manufacturing, Healthcare, etc."
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Company Size <span class="text-red-500">*</span></label>
        <input name="company_size" required placeholder="10-50, 50-200, 200+, etc."
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Target Role <span class="text-red-500">*</span></label>
      <input name="role" required placeholder="CTO, Operations Manager, etc."
             class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Pain Points <span class="text-red-500">*</span></label>
      <textarea name="pain_points" required rows="4" placeholder="What challenges does this profile face?"
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Fit Score (0-100)</label>
      <input name="fit_score" type="number" min="0" max="100" value="50"
             class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <a href="/commercial/icp" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Profile</button>
    </div>
  </form>
</div>
{% endblock %}
