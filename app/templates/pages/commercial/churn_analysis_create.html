{% extends "base.html" %}
{% block title %}New Churn Analysis — Sub #{{ subscription.id }}{% endblock %}
{% block page_title %}New Churn Analysis — Subscription #{{ subscription.id }}{% endblock %}

{% block content %}
<div class="max-w-xl">
  <form method="post" action="/commercial/subscriptions/{{ subscription.id }}/churn-analysis" class="bg-white rounded-lg border p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Analysis Date</label>
        <input name="analysis_date" type="date" required
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Category</label>
        <select name="category" required class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          <option value="price">Price</option>
          <option value="product_fit">Product Fit</option>
          <option value="support">Support</option>
          <option value="performance">Performance</option>
          <option value="competitor">Competitor</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Root Cause</label>
      <textarea name="root_cause" rows="3" required placeholder="Why did the customer churn?"
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"></textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Revenue Lost ($)</label>
        <input name="revenue_lost" type="number" step="0.01" required placeholder="0.00"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Lifetime Value ($)</label>
        <input name="lifetime_value" type="number" step="0.01" placeholder="0.00"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Recommendations</label>
      <textarea name="recommendations" rows="3" placeholder="What can we do to prevent this in the future?"
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"></textarea>
    </div>
    <div class="flex justify-end gap-2">
      <a href="/commercial/subscriptions/{{ subscription.id }}/churn-analysis" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Analysis</button>
    </div>
  </form>
</div>
{% endblock %}
