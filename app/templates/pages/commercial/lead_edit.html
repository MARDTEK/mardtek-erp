{% extends "base.html" %}
{% block title %}Edit {{ item.company }} — Leads{% endblock %}
{% block page_title %}Edit — {{ item.company }}{% endblock %}

{% block content %}
<div class="max-w-2xl space-y-6">

  <!-- Status quick-change -->
  <div class="bg-white rounded-lg border p-4">
    <form method="post" action="/commercial/leads/{{ item.id }}/status" class="flex items-center gap-3">
      <label class="text-sm font-medium text-secondary-700">Pipeline Status:</label>
      <select name="status" class="px-3 py-2 border border-secondary-200 rounded-lg text-sm">
        {% set current = item.status.value if item.status.value is defined else item.status %}
        {% for val, label in [('new','New'),('qualifying','Qualifying'),('qualified','Qualified'),('proposal','Proposal'),('negotiation','Negotiation'),('won','Won'),('lost','Lost'),('disqualified','Disqualified')] %}
        <option value="{{ val }}" {{ 'selected' if current == val }}>{{ label }}</option>
        {% endfor %}
      </select>
      <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700">Update Status</button>
    </form>
  </div>

  <!-- Edit form -->
  <form method="post" action="/commercial/leads/{{ item.id }}/edit" class="bg-white rounded-lg border p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Company <span class="text-red-500">*</span></label>
        <input name="company" required value="{{ item.company }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Source <span class="text-red-500">*</span></label>
        {% set src = item.source %}
        <select name="source" required class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          {% for opt in ['website','referral','inbound','event','cold_outreach','partner'] %}
          <option value="{{ opt }}" {{ 'selected' if src == opt }}>{{ opt | replace('_',' ') | title }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Contact Name <span class="text-red-500">*</span></label>
        <input name="contact_name" required value="{{ item.contact_name }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Email <span class="text-red-500">*</span></label>
        <input name="contact_email" type="email" required value="{{ item.contact_email }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Phone</label>
        <input name="contact_phone" value="{{ item.contact_phone or '' }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Product Line <span class="text-red-500">*</span></label>
        <select name="product_line" required class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          {% for pl in ['SERVICIOS','SAAS','TRAINING'] %}
          <option value="{{ pl }}" {{ 'selected' if item.product_line == pl }}>{{ pl }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">ICP Match (0–100)</label>
        <input name="icp_match_score" type="number" min="0" max="100" value="{{ item.icp_match_score if item.icp_match_score is not none else '' }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Estimated Value ($)</label>
        <input name="estimated_value" type="number" step="0.01" value="{{ item.estimated_value if item.estimated_value else '' }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Assigned To</label>
        <input name="assigned_to" value="{{ item.assigned_to or '' }}"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Notes</label>
      <textarea name="notes" rows="3"
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">{{ item.notes or '' }}</textarea>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <a href="/commercial/leads/{{ item.id }}" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
