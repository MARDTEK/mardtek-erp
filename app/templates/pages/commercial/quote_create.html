{% extends "base.html" %}
{% block title %}New Quote — {{ lead.company }}{% endblock %}
{% block page_title %}New Quote — {{ lead.company }}{% endblock %}

{% block content %}
<div class="max-w-xl">
  <form method="post" action="/commercial/leads/{{ lead.id }}/quotes" class="bg-white rounded-lg border p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Subtotal ($)</label>
        <input name="subtotal" type="number" step="0.01" required placeholder="0.00"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Currency</label>
        <select name="currency" class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          <option value="USD">USD</option>
          <option value="ARS">ARS</option>
          <option value="EUR">EUR</option>
        </select>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Tax Rate (%)</label>
        <input name="tax_rate" type="number" step="0.01" value="0" placeholder="0.00"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Discount (%)</label>
        <input name="discount_percent" type="number" step="0.01" value="0" placeholder="0.00"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Valid Until</label>
      <input name="valid_until" type="date"
             class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Notes</label>
      <textarea name="notes" rows="3" placeholder="Pricing notes..."
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"></textarea>
    </div>
    <div class="flex justify-end gap-2">
      <a href="/commercial/leads/{{ lead.id }}/quotes" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Quote</button>
    </div>
  </form>
</div>
{% endblock %}
