{% extends "base.html" %}
{% block title %}New Handoff — {{ contract.contract_number }}{% endblock %}
{% block page_title %}New Handoff — {{ contract.contract_number }}{% endblock %}

{% block content %}
<div class="max-w-xl">
  <form method="post" action="/commercial/contracts/{{ contract.id }}/handoffs" class="bg-white rounded-lg border p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Target Module</label>
        <select name="target_module" required class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          <option value="P4">P4 — Design & Development</option>
          <option value="P5">P5 — Project Execution</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Project Manager</label>
        <input name="project_manager" required placeholder="PM name"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Handoff Notes</label>
      <textarea name="handoff_notes" rows="4" placeholder="Key information for the project team..."
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"></textarea>
    </div>
    <div class="flex justify-end gap-2">
      <a href="/commercial/contracts/{{ contract.id }}/handoffs" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Handoff</button>
    </div>
  </form>
</div>
{% endblock %}
