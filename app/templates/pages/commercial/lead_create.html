{% extends "base.html" %}
{% from 'macros.html' import form_input, form_textarea, form_select, form_submit %}
{% block title %}Create Lead — Commercial Sales{% endblock %}
{% block page_title %}Create Lead{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <form method="post" action="/commercial/leads" class="bg-white rounded-lg border p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Company <span class="text-red-500">*</span></label>
        <input name="company" required placeholder="Acme Corp"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Source <span class="text-red-500">*</span></label>
        <select name="source" required class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          <option value="website">Website</option>
          <option value="referral">Referral</option>
          <option value="inbound">Inbound</option>
          <option value="event">Event</option>
          <option value="cold_outreach">Cold Outreach</option>
          <option value="partner">Partner</option>
        </select>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Contact Name <span class="text-red-500">*</span></label>
        <input name="contact_name" required placeholder="John Doe"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Email <span class="text-red-500">*</span></label>
        <input name="contact_email" type="email" required placeholder="john@acme.com"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Phone</label>
        <input name="contact_phone" placeholder="+54 11 1234-5678"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Product Line <span class="text-red-500">*</span></label>
        <select name="product_line" required class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
          <option value="SERVICIOS">SERVICIOS</option>
          <option value="SAAS">SAAS</option>
        </select>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Estimated Value ($)</label>
        <input name="estimated_value" type="number" step="0.01" placeholder="0.00"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Assigned To</label>
        <input name="assigned_to" placeholder="Sales rep name"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Notes</label>
      <textarea name="notes" rows="3" placeholder="Initial notes about this lead..."
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"></textarea>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <a href="/commercial/leads" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Lead</button>
    </div>
  </form>
</div>
{% endblock %}
