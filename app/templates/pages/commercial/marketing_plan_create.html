{% extends "base.html" %}
{% block title %}New Marketing Plan{% endblock %}
{% block page_title %}New Marketing Plan{% endblock %}

{% block content %}
<div class="max-w-xl">
  <form method="post" action="/commercial/marketing-plans" class="bg-white rounded-lg border p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Plan Name</label>
      <input name="name" required placeholder="Q3 2026 Inbound Campaign"
             class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-secondary-700 mb-1">Objectives</label>
      <textarea name="objectives" rows="3" required placeholder="What do you want to achieve?"
                class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"></textarea>
    </div>
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Budget ($)</label>
        <input name="budget" type="number" step="0.01" placeholder="0.00"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Start Date</label>
        <input name="start_date" type="date"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">End Date</label>
        <input name="end_date" type="date"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
      </div>
    </div>
    <div class="flex justify-end gap-2">
      <a href="/commercial/marketing-plans" class="px-4 py-2 text-secondary-600 text-sm rounded-lg hover:bg-secondary-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Plan</button>
    </div>
  </form>
</div>
{% endblock %}
