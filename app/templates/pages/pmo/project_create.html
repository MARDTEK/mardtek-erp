{% extends "base.html" %}
{% block title %}Create Project — PMO{% endblock %}
{% block page_title %}New Project{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <form method="post" action="/pmo/projects" class="bg-white rounded-xl border p-6 space-y-6">
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Project Code</label>
          <input name="code" required placeholder="PRJ-2026-001"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Project Name</label>
          <input name="name" required placeholder="ERP Implementation"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
        </div>
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Product Line</label>
          <select name="product_line" required class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
            <option value="SERVICIOS">SERVICIOS</option>
            <option value="SAAS">SAAS</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Project Manager</label>
          <input name="project_manager" required placeholder="Jane Doe"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
        </div>
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Start Date</label>
          <input name="start_date" type="date" required
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Budget ($)</label>
          <input name="budget" type="number" step="0.01" placeholder="50000.00"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500">
        </div>
      </div>
      
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Description / Scope</label>
        <textarea name="description" rows="3" placeholder="High-level project scope..."
                  class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"></textarea>
      </div>
    </div>
    
    <div class="flex justify-end gap-3 pt-4 border-t border-secondary-100">
      <a href="/pmo/projects" class="px-4 py-2 text-secondary-600 text-sm font-medium hover:bg-secondary-50 rounded-lg transition-colors">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm font-medium rounded-lg hover:bg-primary-700 transition-colors">Create Project</button>
    </div>
  </form>
</div>
{% endblock %}
