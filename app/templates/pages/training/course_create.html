{% extends "base.html" %}
{% block title %}New Course — MARDTEK ERP{% endblock %}
{% block page_title %}New Training Course{% endblock %}

{% block content %}
<div class="max-w-3xl">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <form action="/training/courses" method="post" class="space-y-6">
      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Course Code</label>
          <input type="text" name="code" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm">
          <p class="mt-1 text-xs text-gray-500">E.g., CRS-P6-001</p>
        </div>
        
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Course Title</label>
          <input type="text" name="title" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Modality</label>
          <select name="modality" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm">
            <option value="online">Online</option>
            <option value="presential">Presential</option>
            <option value="hybrid">Hybrid</option>
          </select>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Duration (Hours)</label>
          <input type="number" name="duration_hours" required min="1" class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm">
        </div>
        
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Content / Syllabus</label>
          <textarea name="content" rows="4" class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm"></textarea>
        </div>
      </div>
      
      <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
        <a href="/training/courses" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm font-medium hover:bg-primary-700">Create Course</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
