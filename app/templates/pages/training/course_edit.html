{% extends "base.html" %}
{% block title %}Edit Course {{ item.code }} — MARDTEK ERP{% endblock %}
{% block page_title %}Edit Course: {{ item.code }}{% endblock %}

{% block content %}
<div class="max-w-3xl">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <form id="edit-form" action="/training/courses/{{ item.id }}/edit" method="post" class="space-y-6">
      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Course Code</label>
          <input type="text" value="{{ item.code }}" disabled class="w-full rounded-md border-gray-300 bg-gray-50 text-gray-500 shadow-sm sm:text-sm">
          <p class="mt-1 text-xs text-gray-500">Course code cannot be changed.</p>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
          <select name="status" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm">
            {% set current_status = item.status.value if item.status.value is defined else item.status %}
            <option value="draft" {{ 'selected' if current_status == 'draft' }}>Draft</option>
            <option value="published" {{ 'selected' if current_status == 'published' }}>Published</option>
            <option value="archived" {{ 'selected' if current_status == 'archived' }}>Archived</option>
          </select>
        </div>
        
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Course Title</label>
          <input type="text" name="title" value="{{ item.title }}" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Modality</label>
          <select name="modality" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm">
            {% set current_mod = item.modality.value if item.modality.value is defined else item.modality %}
            <option value="online" {{ 'selected' if current_mod == 'online' }}>Online</option>
            <option value="presential" {{ 'selected' if current_mod == 'presential' }}>Presential</option>
            <option value="hybrid" {{ 'selected' if current_mod == 'hybrid' }}>Hybrid</option>
          </select>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Duration (Hours)</label>
          <input type="number" name="duration_hours" value="{{ item.duration_hours }}" required min="1" class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm">
        </div>
        
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Content / Syllabus</label>
          <textarea name="content" rows="10" class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm whitespace-pre-line">{{ item.content }}</textarea>
        </div>
        
        <div class="col-span-2 pt-4 border-t border-gray-100">
          <h4 class="text-sm font-medium text-gray-900 mb-4">Commercial Settings</h4>
          <div class="grid grid-cols-2 gap-6">
            <div class="flex items-center mt-6">
              <input type="checkbox" name="is_sellable" id="is_sellable" value="true" class="h-4 w-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500" {% if item.is_sellable %}checked{% endif %}>
              <label for="is_sellable" class="ml-2 block text-sm text-gray-900">Make this course sellable by Commercial Sales</label>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Base Price</label>
              <div class="relative rounded-md shadow-sm">
                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                  <span class="text-gray-500 sm:text-sm">$</span>
                </div>
                <input type="number" name="base_price" step="0.01" min="0" value="{{ item.base_price }}" class="w-full rounded-md border-gray-300 pl-7 shadow-sm focus:border-primary-500 focus:ring-primary-500 text-sm">
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="flex justify-between items-center pt-6 mt-6 border-t border-gray-100">
      <div>
        <form action="/training/courses/{{ item.id }}/delete" method="post" onsubmit="return confirm('Are you sure you want to delete this course?');">
          <button type="submit" class="px-4 py-2 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg text-sm font-medium transition-colors">Delete Course</button>
        </form>
      </div>
      <div class="flex gap-3">
        <a href="/training/courses/{{ item.id }}" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">Cancel</a>
        <button type="submit" form="edit-form" class="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm font-medium hover:bg-primary-700">Save Changes</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
