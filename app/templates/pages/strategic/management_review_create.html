{% extends "base.html" %}
{% block title %}Create Management Review — Strategic Planning{% endblock %}
{% block page_title %}Create Management Review Report{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="mb-4">
    <a href="/strategic/management-reviews" class="text-sm text-primary-600 hover:text-primary-800">&larr; Management Reviews</a>
  </div>

  <div class="bg-white rounded-lg border p-6">
    <h2 class="text-lg font-semibold mb-4">New Management Review Report</h2>
    <form method="post" action="/strategic/management-reviews" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Code <span class="text-red-500">*</span></label>
          <input name="code" required placeholder="MRR-2026-Q1"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Prepared By <span class="text-red-500">*</span></label>
          <input name="prepared_by" required
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Title <span class="text-red-500">*</span></label>
        <input name="title" required
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Period Start <span class="text-red-500">*</span></label>
          <input type="date" name="review_period_start" required
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Period End <span class="text-red-500">*</span></label>
          <input type="date" name="review_period_end" required
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Summary <span class="text-red-500">*</span></label>
        <textarea name="summary" rows="4" required
                  class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                  placeholder="Provide a summary of the management review..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Conclusions</label>
        <textarea name="conclusions" rows="3"
                  class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                  placeholder="Key conclusions (JSON or plain text)..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Report URL</label>
        <input name="report_url" placeholder="https://..."
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <a href="/strategic/management-reviews" class="px-4 py-2 text-secondary-600 text-sm hover:bg-secondary-50 rounded-lg">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Report</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
