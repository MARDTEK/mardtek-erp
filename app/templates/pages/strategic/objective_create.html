{% extends "base.html" %}
{% block title %}Create Objective — Strategic Planning{% endblock %}
{% block page_title %}Create Quality Objective{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="mb-4">
    <a href="/strategic/objectives" class="text-sm text-primary-600 hover:text-primary-800">&larr; Objectives</a>
  </div>

  <div class="bg-white rounded-lg border p-6">
    <h2 class="text-lg font-semibold mb-4">New Quality Objective</h2>
    <form method="post" action="/strategic/objectives" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Code <span class="text-red-500">*</span></label>
          <input name="code" required placeholder="OBJ-P1-001"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Process <span class="text-red-500">*</span></label>
          <select name="process_code" required class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm">
            {% for i in range(1, 12) %}<option value="P{{ i }}">P{{ i }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Objective <span class="text-red-500">*</span></label>
        <textarea name="objective" rows="3" required
                  class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                  placeholder="Describe the measurable quality objective..."></textarea>
      </div>
      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Target Value <span class="text-red-500">*</span></label>
          <input type="number" name="target_value" step="0.1" required
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Metric Unit <span class="text-red-500">*</span></label>
          <input name="metric_unit" required placeholder="%"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Year <span class="text-red-500">*</span></label>
          <input type="number" name="year" required value="{{ now().year if now is defined else 2026 }}"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Responsible <span class="text-red-500">*</span></label>
        <input name="responsible" required
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <a href="/strategic/objectives" class="px-4 py-2 text-secondary-600 text-sm hover:bg-secondary-50 rounded-lg">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Objective</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
