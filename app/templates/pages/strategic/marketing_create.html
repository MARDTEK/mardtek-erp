{% extends "base.html" %}
{% block title %}Create Marketing Plan — Strategic Planning{% endblock %}
{% block page_title %}Create Marketing Plan{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="mb-4">
    <a href="/strategic/marketing" class="text-sm text-primary-600 hover:text-primary-800">&larr; Marketing Plans</a>
  </div>

  <div class="bg-white rounded-lg border p-6">
    <h2 class="text-lg font-semibold mb-4">New Marketing Plan</h2>
    <form method="post" action="/strategic/marketing" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Code <span class="text-red-500">*</span></label>
          <input name="code" required placeholder="PLN-MKT-001"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Year <span class="text-red-500">*</span></label>
          <input type="number" name="year" required value="{{ now().year if now is defined else 2026 }}"
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Title <span class="text-red-500">*</span></label>
        <input name="title" required
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Goals <span class="text-red-500">*</span></label>
        <textarea name="goals" rows="4" required
                  class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                  placeholder="Describe the marketing goals for this plan..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Budget <span class="text-red-500">*</span></label>
        <input type="number" name="budget" step="0.01" required placeholder="0.00"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <a href="/strategic/marketing" class="px-4 py-2 text-secondary-600 text-sm hover:bg-secondary-50 rounded-lg">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Plan</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
