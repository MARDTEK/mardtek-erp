{% extends "base.html" %}
{% block title %}Create Policy — Strategic Planning{% endblock %}
{% block page_title %}Create Quality Policy{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="mb-4">
    <a href="/strategic/policies" class="text-sm text-primary-600 hover:text-primary-800">&larr; Policies</a>
  </div>

  <div class="bg-white rounded-lg border p-6">
    <h2 class="text-lg font-semibold mb-4">New Quality Policy</h2>
    <form method="post" action="/strategic/policies" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Code <span class="text-red-500">*</span></label>
        <input name="code" required placeholder="POL-P1-001"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Title <span class="text-red-500">*</span></label>
        <input name="title" required
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Content</label>
        <textarea name="content" rows="6"
                  class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Version</label>
        <input name="version" value="1.0"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <a href="/strategic/policies" class="px-4 py-2 text-secondary-600 text-sm hover:bg-secondary-50 rounded-lg">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Policy</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
