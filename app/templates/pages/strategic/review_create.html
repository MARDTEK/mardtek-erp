{% extends "base.html" %}
{% block title %}Create Strategy Review — Strategic Planning{% endblock %}
{% block page_title %}Create Strategy Review{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="mb-4">
    <a href="/strategic/reviews" class="text-sm text-primary-600 hover:text-primary-800">&larr; Reviews</a>
  </div>

  <div class="bg-white rounded-lg border p-6">
    <h2 class="text-lg font-semibold mb-4">New Strategy Review</h2>
    <form method="post" action="/strategic/reviews" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Date <span class="text-red-500">*</span></label>
          <input type="date" name="date_val" required
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary-700 mb-1">Reviewed By <span class="text-red-500">*</span></label>
          <input name="reviewed_by" required
                 class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Summary <span class="text-red-500">*</span></label>
        <textarea name="summary" rows="4" required
                  class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                  placeholder="Provide a summary of the strategy review..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Decisions <span class="text-red-500">*</span></label>
        <textarea name="decisions" rows="4" required
                  class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                  placeholder="List the key decisions made..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-secondary-700 mb-1">Next Review Date</label>
        <input type="date" name="next_review_date"
               class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <a href="/strategic/reviews" class="px-4 py-2 text-secondary-600 text-sm hover:bg-secondary-50 rounded-lg">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700">Create Review</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
