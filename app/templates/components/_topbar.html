{# Topbar macro #}
{% macro topbar(current_user, page_title) %}
<header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-30">
  <div class="flex items-center gap-4">
    <h1 class="text-lg font-semibold text-gray-800">{{ page_title }}</h1>
  </div>
  <div class="flex items-center gap-4">
    {% if current_user %}
    <div class="flex items-center gap-2">
      <span class="text-sm text-secondary-600">{{ current_user.role }}</span>
      <div class="w-8 h-8 rounded-full bg-primary-100 text-primary-700 flex items-center justify-center text-sm font-medium">
        {{ current_user.role[0]|upper }}
      </div>
    </div>
    {% endif %}
    <form method="post" action="/logout" class="inline">
      <button type="submit" class="text-sm text-secondary-500 hover:text-red-600 transition-colors">Logout</button>
    </form>
  </div>
</header>
{% endmacro %}
