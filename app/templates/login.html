<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MARDTEK ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="h-full bg-gray-50 flex items-center justify-center">

  <div class="w-full max-w-md" x-data="{ loading: false }">
    <div class="bg-white rounded-xl shadow-lg p-8">
      <!-- Logo -->
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">MARDTEK</h1>
        <p class="text-sm text-gray-500 mt-1">ERP — Gestión de Calidad ISO 9001</p>
      </div>

      <!-- Error message -->
      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
        {{ error }}
      </div>
      {% endif %}

      <!-- Login form -->
      <form method="post" action="/login" @submit="loading = true" hx-boost="false">
        <input type="hidden" name="_csrf" value="{{ csrf_token }}">

        <div class="mb-4">
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="username" name="username" required autofocus
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500
                        text-sm"
                 placeholder="Enter your username">
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500
                        text-sm"
                 placeholder="Enter your password">
        </div>

        <button type="submit"
                :disabled="loading"
                class="w-full py-2.5 px-4 bg-primary-600 hover:bg-primary-700 text-white
                       font-medium rounded-lg text-sm transition-colors
                       focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500
                       disabled:opacity-50 disabled:cursor-not-allowed">
          <span x-show="!loading">Sign in</span>
          <span x-show="loading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Signing in...
          </span>
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-4">MARDTEK ERP v0.1.0</p>
  </div>

</body>
</html>
